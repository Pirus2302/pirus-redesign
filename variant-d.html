<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Д · Летающие буквы PIRUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#ffffff;--ink:#0d1e2e;--muted:#5f696d;--line:rgba(13,30,46,.10);--accent:#69dcdc;--accent-deep:#377b88;--ease:cubic-bezier(.16,1,.3,1);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Golos Text',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden;height:100svh;}
  .switch{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:6px;align-items:center;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:999px;padding:6px;box-shadow:0 8px 30px rgba(13,30,46,.08);font-size:13px;}
  .switch a{padding:7px 13px;border-radius:999px;color:var(--muted);font-weight:600;white-space:nowrap;text-decoration:none;}
  .switch a.on{background:var(--ink);color:#fff;}.switch a:hover:not(.on){background:rgba(13,30,46,.06);}

  /* мягкий бирюзовый отлив на белом */
  body::before{content:"";position:fixed;inset:0;z-index:0;background:radial-gradient(60% 50% at 50% 46%,rgba(105,220,220,.18),transparent 70%);pointer-events:none;}

  .stage{position:relative;z-index:2;height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;perspective:1100px;cursor:default;}
  .word{display:flex;align-items:flex-end;gap:.01em;transform-style:preserve-3d;transform:rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg));transition:transform .18s var(--ease);filter:drop-shadow(0 28px 46px rgba(105,220,220,.4));}
  .letter{transform-style:preserve-3d;transform:translateZ(calc(var(--base,0px) + var(--lift,0px)));transition:transform .3s var(--ease);}
  .letter .face{
    display:inline-block;font-weight:900;font-size:clamp(4.5rem,21vw,17rem);line-height:.9;letter-spacing:-.02em;
    color:#69dcdc;
    text-shadow:
      0 -1px 0 #c7f4ef,
      0 1px 0 #5fd0c6,0 2px 0 #57c6bd,0 3px 0 #4fbcb4,0 4px 0 #47b2ab,
      0 5px 0 #3fa8a2,0 6px 0 #379e99,0 7px 0 #318f8b,0 8px 0 #2b807d,
      0 9px 0 #25716f,0 10px 0 #206261,0 11px 0 #1a5453,0 12px 0 #154545,
      0 18px 26px rgba(13,30,46,.22);
    animation:float 4.6s ease-in-out infinite;
  }
  .letter .face.dot{color:#377b88;}
  .letter:nth-child(1) .face{animation-delay:0s;}
  .letter:nth-child(2) .face{animation-delay:.35s;}
  .letter:nth-child(3) .face{animation-delay:.7s;}
  .letter:nth-child(4) .face{animation-delay:1.05s;}
  .letter:nth-child(5) .face{animation-delay:1.4s;}
  .letter:nth-child(6) .face{animation-delay:1.75s;}
  @keyframes float{0%,100%{transform:translateY(0) rotateZ(0);}50%{transform:translateY(-18px) rotateZ(-1.2deg);}}

  .tagline{margin-top:48px;text-align:center;z-index:2;}
  .tagline .t{font-size:clamp(1.1rem,2.4vw,1.6rem);font-weight:700;letter-spacing:-.02em;}
  .tagline .s{margin-top:8px;color:var(--muted);font-weight:500;}
  .hint{position:fixed;bottom:24px;left:0;right:0;text-align:center;color:var(--muted);font-size:13px;z-index:2;}

  @media (prefers-reduced-motion:reduce){.letter .face{animation:none;}.word{transition:none;}}
</style></head><body>
<div class="switch"><a href="variant-a.html">А · Взлёт</a><a href="variant-b.html">Б · Запрос→ответ</a><a href="variant-v.html">В · Сборка</a><a href="variant-g.html">Г · Потоки</a><a class="on" href="variant-d.html">Д · Буквы</a></div>

<div class="stage" id="stage">
  <div class="word" id="word">
    <div class="letter" style="--base:10px"><span class="face">P</span></div>
    <div class="letter" style="--base:60px"><span class="face">I</span></div>
    <div class="letter" style="--base:30px"><span class="face">R</span></div>
    <div class="letter" style="--base:70px"><span class="face">U</span></div>
    <div class="letter" style="--base:20px"><span class="face">S</span></div>
    <div class="letter" style="--base:90px"><span class="face dot">.</span></div>
  </div>
  <div class="tagline">
    <div class="t">Продвижение и разработка сайтов</div>
    <div class="s">Преобразим ваш сайт в источник дохода!</div>
  </div>
</div>
<div class="hint">Поводи мышкой — буквы реагируют</div>

<script>
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var fine=matchMedia('(pointer:fine)').matches;
  var stage=document.getElementById('stage'),word=document.getElementById('word');
  var letters=Array.from(document.querySelectorAll('.letter'));
  var trx=0,try_=0,crx=0,cry=0,raf=null,lifts=letters.map(function(){return 0;});

  if(!reduce && fine){
    stage.addEventListener('mousemove',function(e){
      var w=innerWidth,h=innerHeight;
      try_=((e.clientX/w)-0.5)*26;   // наклон по Y
      trx=((e.clientY/h)-0.5)*-18;   // наклон по X
      // подъём ближайших букв
      letters.forEach(function(L,i){
        var r=L.getBoundingClientRect();var lcx=r.left+r.width/2,lcy=r.top+r.height/2;
        var dx=e.clientX-lcx,dy=e.clientY-lcy,dist=Math.sqrt(dx*dx+dy*dy);
        lifts[i]=Math.max(0,90-dist*0.18);
      });
      if(!raf)raf=requestAnimationFrame(loop);
    });
    stage.addEventListener('mouseleave',function(){trx=0;try_=0;lifts=letters.map(function(){return 0;});if(!raf)raf=requestAnimationFrame(loop);});
    function loop(){
      crx+=(trx-crx)*0.09;cry+=(try_-cry)*0.09;
      word.style.setProperty('--rx',crx.toFixed(2)+'deg');
      word.style.setProperty('--ry',cry.toFixed(2)+'deg');
      var moving=Math.abs(trx-crx)>0.1||Math.abs(try_-cry)>0.1;
      letters.forEach(function(L,i){
        var cur=parseFloat(L.style.getPropertyValue('--lift'))||0;
        var nl=cur+(lifts[i]-cur)*0.12;
        L.style.setProperty('--lift',nl.toFixed(1)+'px');
        if(Math.abs(lifts[i]-nl)>0.4)moving=true;
      });
      if(moving){raf=requestAnimationFrame(loop);}else{raf=null;}
    }
  }
</script>
</body></html>
