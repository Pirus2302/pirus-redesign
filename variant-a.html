<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>А · Взлёт в выдаче</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f5f6f6;--surface:#fff;--ink:#0d1e2e;--muted:#5f696d;--line:rgba(13,30,46,.10);--line-soft:rgba(13,30,46,.06);--accent:#69dcdc;--accent-deep:#377b88;--ease:cubic-bezier(.16,1,.3,1);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Golos Text',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  /* переключатель */
  .switch{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:6px;align-items:center;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:999px;padding:6px;box-shadow:0 8px 30px rgba(13,30,46,.08);font-size:13px;}
  .switch a{padding:7px 13px;border-radius:999px;color:var(--muted);font-weight:600;white-space:nowrap;text-decoration:none;}
  .switch a.on{background:var(--ink);color:#fff;}
  .switch a:hover:not(.on){background:rgba(13,30,46,.06);}
  .hero{min-height:100svh;display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:48px;max-width:1200px;margin:0 auto;padding:120px clamp(20px,5vw,56px) 60px;}
  h1{font-size:clamp(2.2rem,4.6vw,4rem);font-weight:800;line-height:1.05;letter-spacing:-.03em;}
  h1 .ac{color:var(--accent-deep);}
  .sub{margin-top:22px;color:var(--muted);font-size:1.2rem;font-weight:500;max-width:30ch;}
  .cap{margin-top:18px;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);font-weight:600;}
  /* SERP-карточка */
  .serp{position:relative;background:var(--surface);border:1px solid var(--line-soft);border-radius:20px;box-shadow:0 30px 70px rgba(13,30,46,.12);padding:22px;height:420px;overflow:hidden;}
  .serp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .serp-q{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted);background:var(--bg);border-radius:999px;padding:9px 16px;flex:1;}
  .serp-q b{width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .rankbadge{margin-left:14px;font-weight:800;font-size:14px;color:var(--accent-deep);white-space:nowrap;}
  .rows{position:relative;height:320px;}
  .row{position:absolute;left:0;right:0;height:46px;display:flex;align-items:center;gap:12px;padding:0 12px;border-radius:12px;}
  .row .fav{width:22px;height:22px;border-radius:6px;background:rgba(13,30,46,.1);flex:none;}
  .row .lines{flex:1;}
  .row .l1{height:8px;width:60%;background:rgba(13,30,46,.16);border-radius:4px;}
  .row .l2{height:6px;width:40%;background:rgba(13,30,46,.08);border-radius:4px;margin-top:7px;}
  .ghost{background:transparent;}
  .you{background:linear-gradient(120deg,rgba(105,220,220,.22),rgba(105,220,220,.06));border:1px solid rgba(105,220,220,.5);box-shadow:0 10px 26px rgba(105,220,220,.3);animation:climb 5s var(--ease) infinite;}
  .you .fav{background:var(--accent);}
  .you .l1{width:55%;background:var(--accent-deep);}
  .you .name{font-weight:700;font-size:14px;color:var(--ink);}
  @keyframes climb{0%{transform:translateY(274px);}12%{transform:translateY(274px);}80%{transform:translateY(0);}100%{transform:translateY(0);}}
  .traffic{position:absolute;right:22px;bottom:18px;font-weight:800;font-size:15px;color:var(--accent-deep);}
  @media (max-width:880px){.hero{grid-template-columns:1fr;gap:36px;}.serp{height:380px;}}
  @media (prefers-reduced-motion:reduce){.you{animation:none;transform:translateY(0);}}
</style></head><body>
<div class="switch"><a class="on" href="variant-a.html">А · Взлёт</a><a href="variant-b.html">Б · Запрос→ответ</a><a href="variant-v.html">В · Сборка</a><a href="variant-g.html">Г · Потоки</a><a href="variant-d.html">Д · Буквы</a></div>
<section class="hero">
  <div>
    <div class="cap">SEO · вывод в ТОП</div>
    <h1>Поднимаем ваш сайт <span class="ac">в самый верх</span> выдачи</h1>
    <p class="sub">Преобразим ваш сайт в источник дохода.</p>
  </div>
  <div class="serp">
    <div class="serp-top">
      <div class="serp-q"><b></b>seo продвижение минск</div>
      <div class="rankbadge">Позиция <span id="rank">8</span></div>
    </div>
    <div class="rows">
      <div class="row ghost" style="top:0"><div class="fav"></div><div class="lines"><div class="l1"></div><div class="l2"></div></div></div>
      <div class="row ghost" style="top:55px"><div class="fav"></div><div class="lines"><div class="l1"></div><div class="l2"></div></div></div>
      <div class="row ghost" style="top:110px"><div class="fav"></div><div class="lines"><div class="l1"></div><div class="l2"></div></div></div>
      <div class="row ghost" style="top:165px"><div class="fav"></div><div class="lines"><div class="l1"></div><div class="l2"></div></div></div>
      <div class="row ghost" style="top:220px"><div class="fav"></div><div class="lines"><div class="l1"></div><div class="l2"></div></div></div>
      <div class="row ghost" style="top:274px"><div class="fav"></div><div class="lines"><div class="l1"></div><div class="l2"></div></div></div>
      <div class="row you" style="top:0"><div class="fav"></div><div class="lines"><div class="name">pirus-agency.by</div><div class="l1" style="margin-top:6px"></div></div></div>
    </div>
    <div class="traffic">Трафик: <span id="tr">+312</span>%</div>
  </div>
</section>
<script>
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var rank=document.getElementById('rank'),tr=document.getElementById('tr');
  if(reduce){rank.textContent='1';tr.textContent='+312';}
  else{
    function cycle(){
      var ranks=[8,8,6,5,3,2,1,1],i=0;
      rank.textContent=8;
      var t=setInterval(function(){i++;if(i>=ranks.length){clearInterval(t);return;}rank.textContent=ranks[i];},560);
      var v=0,t2=setInterval(function(){v+=18;if(v>=312){v=312;clearInterval(t2);}tr.textContent='+'+v;},230);
    }
    cycle();setInterval(cycle,5000);
  }
</script>
</body></html>
