<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pirus — герой (тёмный)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  /* Pirus hero — тёмная версия. Приём dasweb (3D-объект + заголовок-великан),
     но наши буквы, наш контент, наша бирюза #69dcdc. Не копия. */
  :root{--bg:#0a0e11;--ink:#ffffff;--muted:#8a99a0;--line:rgba(255,255,255,.14);
        --accent:#69dcdc;--accent-deep:#377b88;--ease:cubic-bezier(.16,1,.3,1);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Golos Text',system-ui,sans-serif;background:var(--bg);color:var(--ink);
       -webkit-font-smoothing:antialiased;overflow:hidden;height:100svh;}
  body::before{content:"";position:fixed;inset:0;z-index:0;
       background:radial-gradient(54% 46% at 50% 40%,rgba(105,220,220,.20),transparent 70%);pointer-events:none;}

  .switch{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:6px;
          background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid var(--line);
          border-radius:999px;padding:6px;font-size:13px;}
  .switch a{padding:7px 14px;border-radius:999px;color:var(--muted);font-weight:600;text-decoration:none;}
  .switch a.on{background:#fff;color:#0a0e11;}.switch a:hover:not(.on){color:#fff;}

  /* верхняя панель */
  .top{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
       padding:26px clamp(20px,4vw,48px);}
  .logo{font-weight:900;font-size:clamp(1.6rem,3vw,2.2rem);letter-spacing:-.04em;}
  .logo .d{color:var(--accent);}
  .top-r{display:flex;align-items:center;gap:14px;}
  .pill{display:inline-flex;align-items:center;gap:9px;height:48px;padding:0 24px;border-radius:999px;
        background:var(--accent);color:#0a0e11;font-weight:700;font-size:15px;text-decoration:none;
        transition:transform .2s var(--ease),box-shadow .25s var(--ease);box-shadow:0 10px 30px rgba(105,220,220,.3);}
  .pill:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(105,220,220,.5);}
  .burger{width:48px;height:48px;border:1px solid var(--line);border-radius:50%;display:flex;flex-direction:column;
          align-items:center;justify-content:center;gap:5px;cursor:pointer;background:rgba(255,255,255,.04);}
  .burger span{width:16px;height:2px;background:#fff;}

  /* сцена */
  .stage{position:relative;z-index:2;height:100svh;perspective:1100px;}

  /* 3D-объект PIRUS */
  .object{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);}
  .word{display:flex;align-items:flex-end;transform-style:preserve-3d;
        transform:rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg));transition:transform .18s var(--ease);
        filter:drop-shadow(0 30px 60px rgba(105,220,220,.45));}
  .letter{transform-style:preserve-3d;transform:translateZ(calc(var(--base,0px) + var(--lift,0px)));transition:transform .3s var(--ease);}
  .letter .face{display:inline-block;font-weight:900;font-size:clamp(3.4rem,15vw,12rem);line-height:.9;letter-spacing:-.02em;color:#7fe9e9;
    text-shadow:0 -1px 0 #c7f4ef,0 1px 0 #5fd0c6,0 2px 0 #54c2ba,0 3px 0 #49b4ae,0 4px 0 #3fa6a2,
      0 5px 0 #359896,0 6px 0 #2c8a8a,0 7px 0 #237b7d,0 8px 0 #1c6d70,0 9px 0 #155f63,0 10px 0 #105156,
      0 16px 30px rgba(0,0,0,.6);animation:float 4.6s ease-in-out infinite;}
  .letter .face.dot{color:var(--accent-deep);}
  .letter:nth-child(1) .face{animation-delay:0s;}.letter:nth-child(2) .face{animation-delay:.35s;}
  .letter:nth-child(3) .face{animation-delay:.7s;}.letter:nth-child(4) .face{animation-delay:1.05s;}
  .letter:nth-child(5) .face{animation-delay:1.4s;}.letter:nth-child(6) .face{animation-delay:1.75s;}
  @keyframes float{0%,100%{transform:translateY(0) rotateZ(0);}50%{transform:translateY(-16px) rotateZ(-1deg);}}

  /* заголовок-великан внизу */
  .headline{position:absolute;left:clamp(20px,4vw,48px);bottom:clamp(56px,9vw,96px);right:clamp(20px,4vw,48px);z-index:3;}
  .headline h1{font-size:clamp(2.4rem,8.5vw,8rem);font-weight:900;line-height:.95;letter-spacing:-.045em;max-width:16ch;}
  .headline h1 .ac{color:var(--accent);}
  .headline p{margin-top:18px;color:var(--muted);font-size:clamp(1rem,1.8vw,1.35rem);font-weight:500;max-width:42ch;}

  .hint{position:fixed;bottom:64px;right:clamp(20px,4vw,48px);color:var(--muted);font-size:12px;z-index:3;}
  @media (max-width:760px){.object{top:26%;}.headline{bottom:120px;}.hint{display:none;}}
  @media (prefers-reduced-motion:reduce){.letter .face{animation:none;}.word{transition:none;}}
</style></head><body>

<div class="top">
  <div class="logo">pirus<span class="d">.</span></div>
  <div class="top-r">
    <a href="#" class="pill"><i class="ph ph-arrow-right"></i>Оставить заявку</a>
    <div class="burger"><span></span><span></span><span></span></div>
  </div>
</div>

<div class="stage" id="stage">
  <div class="object">
    <div class="word" id="word">
      <div class="letter" style="--base:10px"><span class="face">P</span></div>
      <div class="letter" style="--base:60px"><span class="face">I</span></div>
      <div class="letter" style="--base:30px"><span class="face">R</span></div>
      <div class="letter" style="--base:70px"><span class="face">U</span></div>
      <div class="letter" style="--base:20px"><span class="face">S</span></div>
      <div class="letter" style="--base:90px"><span class="face dot">.</span></div>
    </div>
  </div>
  <div class="headline">
    <h1>Продвижение и <span class="ac">разработка</span> сайтов</h1>
    <p>Преобразим ваш сайт в источник дохода.</p>
  </div>
</div>
<div class="hint">Поводи мышкой — буквы реагируют</div>

<div class="switch"><a href="hero-white.html">Белый</a><a class="on" href="hero-dark.html">Тёмный</a></div>

<script>
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches,fine=matchMedia('(pointer:fine)').matches;
  var stage=document.getElementById('stage'),word=document.getElementById('word');
  var letters=Array.from(document.querySelectorAll('.letter'));
  var trx=0,try_=0,crx=0,cry=0,raf=null,lifts=letters.map(function(){return 0;});
  if(!reduce&&fine){
    stage.addEventListener('mousemove',function(e){
      var w=innerWidth,h=innerHeight;try_=((e.clientX/w)-.5)*26;trx=((e.clientY/h)-.5)*-18;
      letters.forEach(function(L,i){var r=L.getBoundingClientRect();var dx=e.clientX-(r.left+r.width/2),dy=e.clientY-(r.top+r.height/2);
        lifts[i]=Math.max(0,90-Math.sqrt(dx*dx+dy*dy)*.18);});
      if(!raf)raf=requestAnimationFrame(loop);});
    stage.addEventListener('mouseleave',function(){trx=0;try_=0;lifts=letters.map(function(){return 0;});if(!raf)raf=requestAnimationFrame(loop);});
    function loop(){crx+=(trx-crx)*.09;cry+=(try_-cry)*.09;
      word.style.setProperty('--rx',crx.toFixed(2)+'deg');word.style.setProperty('--ry',cry.toFixed(2)+'deg');
      var moving=Math.abs(trx-crx)>.1||Math.abs(try_-cry)>.1;
      letters.forEach(function(L,i){var cur=parseFloat(L.style.getPropertyValue('--lift'))||0;var nl=cur+(lifts[i]-cur)*.12;
        L.style.setProperty('--lift',nl.toFixed(1)+'px');if(Math.abs(lifts[i]-nl)>.4)moving=true;});
      if(moving){raf=requestAnimationFrame(loop);}else{raf=null;}}
  }
</script>
</body></html>
