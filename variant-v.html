<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>В · Сайт собирается</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f5f6f6;--surface:#fff;--ink:#0d1e2e;--muted:#5f696d;--line:rgba(13,30,46,.10);--line-soft:rgba(13,30,46,.06);--accent:#69dcdc;--accent-deep:#377b88;--ease:cubic-bezier(.16,1,.3,1);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Golos Text',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  .switch{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:6px;align-items:center;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:999px;padding:6px;box-shadow:0 8px 30px rgba(13,30,46,.08);font-size:13px;}
  .switch a{padding:7px 13px;border-radius:999px;color:var(--muted);font-weight:600;white-space:nowrap;text-decoration:none;}
  .switch a.on{background:var(--ink);color:#fff;}.switch a:hover:not(.on){background:rgba(13,30,46,.06);}
  .hero{min-height:100svh;display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:48px;max-width:1200px;margin:0 auto;padding:120px clamp(20px,5vw,56px) 60px;}
  .cap{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);font-weight:600;}
  h1{font-size:clamp(2.2rem,4.6vw,4rem);font-weight:800;line-height:1.05;letter-spacing:-.03em;margin-top:16px;}
  h1 .ac{color:var(--accent-deep);}
  .sub{margin-top:22px;color:var(--muted);font-size:1.2rem;font-weight:500;max-width:30ch;}
  /* окно браузера */
  .win{background:var(--surface);border:1px solid var(--line-soft);border-radius:16px;box-shadow:0 30px 70px rgba(13,30,46,.12);overflow:hidden;height:420px;display:flex;flex-direction:column;}
  .bar{display:flex;align-items:center;gap:7px;padding:14px 16px;border-bottom:1px solid var(--line-soft);}
  .bar i{width:11px;height:11px;border-radius:50%;background:rgba(13,30,46,.14);}
  .bar .url{margin-left:12px;font-size:12px;color:var(--muted);background:var(--bg);border-radius:999px;padding:6px 14px;}
  .canvas{flex:1;padding:18px;display:flex;flex-direction:column;gap:12px;}
  .blk{background:var(--bg);border:1px solid var(--line-soft);border-radius:10px;opacity:0;transform:translateY(16px) scale(.97);}
  .blk.in{opacity:1;transform:none;transition:opacity .5s var(--ease),transform .5s var(--ease);}
  .b-head{height:38px;display:flex;align-items:center;padding:0 14px;gap:10px;}
  .b-head .logo{width:60px;height:12px;background:var(--accent);border-radius:4px;}
  .b-head .nav{margin-left:auto;display:flex;gap:10px;}.b-head .nav i{width:34px;height:8px;background:rgba(13,30,46,.14);border-radius:4px;display:block;}
  .b-hero{flex:1;background:linear-gradient(140deg,rgba(105,220,220,.16),rgba(105,220,220,.04));border-color:rgba(105,220,220,.3);display:flex;flex-direction:column;justify-content:center;padding:0 18px;gap:9px;}
  .b-hero .t{width:70%;height:16px;background:var(--accent-deep);border-radius:5px;}.b-hero .s{width:48%;height:9px;background:rgba(13,30,46,.18);border-radius:4px;}
  .cards{display:flex;gap:12px;}.cards .blk{flex:1;height:70px;}
  .check{position:absolute;}
  @media (max-width:880px){.hero{grid-template-columns:1fr;gap:32px;}.win{height:380px;}}
</style></head><body>
<div class="switch"><a href="variant-a.html">А · Взлёт</a><a href="variant-b.html">Б · Запрос→ответ</a><a class="on" href="variant-v.html">В · Сборка</a><a href="variant-g.html">Г · Потоки</a><a href="variant-d.html">Д · Буквы</a></div>
<section class="hero">
  <div>
    <div class="cap">Разработка · полный цикл</div>
    <h1>Собираем сайт, <span class="ac">готовый</span> приносить доход</h1>
    <p class="sub">От идеи до поддержки, с фокусом на эффективность.</p>
  </div>
  <div class="win">
    <div class="bar"><i></i><i></i><i></i><span class="url">pirus-agency.by</span></div>
    <div class="canvas">
      <div class="blk b-head" data-step="1"><div class="logo"></div><div class="nav"><i></i><i></i><i></i></div></div>
      <div class="blk b-hero" data-step="2"><div class="t"></div><div class="s"></div></div>
      <div class="cards">
        <div class="blk" data-step="3"></div><div class="blk" data-step="4"></div><div class="blk" data-step="5"></div>
      </div>
    </div>
  </div>
</section>
<script>
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var blocks=Array.from(document.querySelectorAll('.blk'));
  function build(){
    blocks.forEach(function(b){b.classList.remove('in');});
    if(reduce){blocks.forEach(function(b){b.classList.add('in');});return;}
    blocks.forEach(function(b,i){setTimeout(function(){b.classList.add('in');},250+i*260);});
  }
  build();setInterval(build,5200);
</script>
</body></html>
