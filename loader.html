<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pirus — экран загрузки (концепт v2)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f5f4; --ink:#0d1e2e; --muted:#7b858a;
    --accent:#69dcdc; --accent-deep:#377b88; --ease:cubic-bezier(0.16,1,0.3,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);height:100svh;overflow:hidden;}

  /* экран сайта под загрузчиком */
  .reveal-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;text-align:center;padding:24px;color:var(--ink);}
  .reveal-screen .big{font-weight:800;font-size:clamp(2.4rem,7vw,5rem);letter-spacing:-0.04em;line-height:1;}
  .reveal-screen .big .dot{color:var(--accent-deep);}
  .reveal-screen .note{color:var(--muted);font-weight:500;max-width:34ch;}
  .replay{margin-top:6px;display:inline-flex;align-items:center;height:50px;padding:0 28px;border-radius:999px;background:var(--accent);color:var(--ink);font-weight:700;font-size:15px;border:none;cursor:pointer;transition:transform .2s var(--ease),background .2s var(--ease);}
  .replay:hover{background:#7fe6e6;} .replay:active{transform:translateY(1px);}

  /* ЗАГРУЗЧИК — белый, центр, без шторы (растворяется) */
  .loader{position:fixed;inset:0;z-index:10;background:#ffffff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity .8s var(--ease);}
  .loader.done{opacity:0;pointer-events:none;}
  .loader .word{font-weight:800;font-size:clamp(1.4rem,3vw,1.9rem);letter-spacing:-0.02em;color:var(--ink);}
  .loader .word .dot{color:var(--accent-deep);}
  .pct{font-weight:800;font-size:clamp(4rem,16vw,10rem);letter-spacing:-0.05em;line-height:.9;font-variant-numeric:tabular-nums;color:var(--ink);}
  .pct .sign{color:var(--accent-deep);}
  .track{width:min(220px,60vw);height:2px;background:rgba(13,30,46,0.10);border-radius:2px;overflow:hidden;}
  .track .fill{height:100%;width:0%;background:var(--accent);border-radius:2px;}

  @media (prefers-reduced-motion: reduce){ .loader{transition:none;} }
</style>
</head>
<body>
  <div class="reveal-screen">
    <div class="big">PIRUS<span class="dot">.</span></div>
    <p class="note">Так загрузчик растворяется и открывает сайт. Нажми, чтобы посмотреть ещё раз.</p>
    <button class="replay" id="replay">Повторить анимацию</button>
  </div>

  <div class="loader" id="loader">
    <div class="word">PIRUS<span class="dot">.</span></div>
    <div class="pct"><span id="pct">0</span><span class="sign">%</span></div>
    <div class="track"><div class="fill" id="fill"></div></div>
  </div>

<script>
  var reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var loader=document.getElementById('loader'),pctEl=document.getElementById('pct'),fill=document.getElementById('fill');
  function run(){
    loader.classList.remove('done');loader.style.display='flex';
    if(reduce){pctEl.textContent='100';fill.style.width='100%';setTimeout(function(){loader.classList.add('done');},300);return;}
    var p=0;
    var t=setInterval(function(){
      p+=Math.random()*8+3;
      if(p>=100){p=100;clearInterval(t);setTimeout(function(){loader.classList.add('done');},350);}
      pctEl.textContent=Math.floor(p);fill.style.width=p+'%';
    },90);
  }
  run();
  document.getElementById('replay').addEventListener('click',run);
</script>
</body>
</html>
