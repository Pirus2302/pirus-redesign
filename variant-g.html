<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Г · Потоки к точке</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f5f6f6;--surface:#fff;--ink:#0d1e2e;--muted:#5f696d;--line:rgba(13,30,46,.10);--accent:#69dcdc;--accent-deep:#377b88;--ease:cubic-bezier(.16,1,.3,1);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Golos Text',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden;}
  .switch{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:6px;align-items:center;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:999px;padding:6px;box-shadow:0 8px 30px rgba(13,30,46,.08);font-size:13px;}
  .switch a{padding:7px 13px;border-radius:999px;color:var(--muted);font-weight:600;white-space:nowrap;text-decoration:none;}
  .switch a.on{background:var(--ink);color:#fff;}.switch a:hover:not(.on){background:rgba(13,30,46,.06);}
  canvas{position:fixed;inset:0;z-index:0;}
  .hero{position:relative;z-index:2;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px clamp(20px,5vw,56px) 60px;pointer-events:none;}
  .cap{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);font-weight:600;margin-bottom:18px;}
  h1{font-size:clamp(2.2rem,5vw,4.2rem);font-weight:800;line-height:1.04;letter-spacing:-.03em;max-width:16ch;}
  h1 .ac{color:var(--accent-deep);}
  .sub{margin-top:22px;color:var(--muted);font-size:1.2rem;font-weight:500;max-width:32ch;}
</style></head><body>
<div class="switch"><a href="variant-a.html">А · Взлёт</a><a href="variant-b.html">Б · Запрос→ответ</a><a href="variant-v.html">В · Сборка</a><a class="on" href="variant-g.html">Г · Потоки</a><a href="variant-d.html">Д · Буквы</a></div>
<canvas id="c"></canvas>
<section class="hero">
  <div class="cap">SEO · GEO · трафик отовсюду</div>
  <h1>Собираем ваш трафик <span class="ac">со всех источников</span></h1>
  <p class="sub">Поиск, нейроответы, локальная выдача — всё ведёт к вам.</p>
</section>
<script>
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var cv=document.getElementById('c'),ctx=cv.getContext('2d'),W,H,cx,cy,mx=null,my=null;
  function size(){W=cv.width=innerWidth;H=cv.height=innerHeight;cx=W/2;cy=H*0.5;}
  size();addEventListener('resize',size);
  addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;});
  addEventListener('mouseout',function(){mx=null;my=null;});
  // источники по краям
  var N=9,sources=[],dots=[];
  for(var i=0;i<N;i++){var a=(i/N)*Math.PI*2;sources.push({x:Math.cos(a),y:Math.sin(a),ph:Math.random()});}
  function spawn(){
    var s=sources[Math.floor(Math.random()*sources.length)];
    var R=Math.min(W,H)*0.46;
    dots.push({sx:cx+s.x*R,sy:cy+s.y*R*0.8,t:0,sp:0.004+Math.random()*0.004,r:1.6+Math.random()*1.8});
  }
  var pulse=0;
  function frame(){
    ctx.clearRect(0,0,W,H);
    var tx=mx!==null?cx+(mx-cx)*0.18:cx, ty=my!==null?cy+(my-cy)*0.18:cy;
    var R=Math.min(W,H)*0.46;
    // линии-направляющие
    ctx.lineWidth=1;
    for(var i=0;i<sources.length;i++){var s=sources[i];var px=cx+s.x*R,py=cy+s.y*R*0.8;
      ctx.strokeStyle='rgba(55,123,136,0.10)';ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(tx,ty);ctx.stroke();
    }
    // точки летят к центру
    if(!reduce && dots.length<70 && Math.random()<0.6)spawn();
    for(var d=dots.length-1;d>=0;d--){var o=dots[d];o.t+=o.sp;
      var x=o.sx+(tx-o.sx)*ease(o.t),y=o.sy+(ty-o.sy)*ease(o.t);
      ctx.fillStyle='rgba(105,220,220,'+(0.25+0.6*o.t)+')';ctx.beginPath();ctx.arc(x,y,o.r,0,7);ctx.fill();
      if(o.t>=1)dots.splice(d,1);
    }
    // центральный узел
    pulse+=0.04;var pr=10+Math.sin(pulse)*3;
    var g=ctx.createRadialGradient(tx,ty,0,tx,ty,60);g.addColorStop(0,'rgba(105,220,220,0.55)');g.addColorStop(1,'rgba(105,220,220,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(tx,ty,60,0,7);ctx.fill();
    ctx.fillStyle='#377b88';ctx.beginPath();ctx.arc(tx,ty,pr,0,7);ctx.fill();
    requestAnimationFrame(frame);
  }
  function ease(t){return t<0?0:t>1?1:t*t*(3-2*t);}
  if(reduce){ // статичная картинка
    var R=Math.min(W,H)*0.46;ctx.fillStyle='#377b88';ctx.beginPath();ctx.arc(cx,cy,12,0,7);ctx.fill();
  } else { frame(); }
</script>
</body></html>
